<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Camera PTZ</title>
<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}
#video{
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:#000;
}
#msg{
    position:fixed;
    top:10px;
    left:10px;
    z-index:99;
    color:#fff;
    background:rgba(0,0,0,.6);
    padding:8px 12px;
    border-radius:8px;
    font-family:Arial, sans-serif;
    font-size:14px;
}
</style>
</head>
<body>

<div id="msg">Conectando câmera...</div>
<video id="video" autoplay muted playsinline controls></video>

<script src="https://cdn.jsdelivr.net/npm/flv.js/dist/flv.min.js"></script>

<script>
const video = document.getElementById("video");
const msg   = document.getElementById("msg");

const streamUrl = "http://192.168.18.107:30080/live/stream1.live.flv";

if (flvjs.isSupported()) {

    const player = flvjs.createPlayer({
        type: 'flv',
        url: streamUrl,
        isLive: true
    });

    player.attachMediaElement(video);
    player.load();

    player.play().then(()=>{
        msg.innerHTML = "Câmera conectada";
        setTimeout(()=>msg.style.display='none',2000);
    }).catch(()=>{
        msg.innerHTML = "Toque no play";
    });

} else {
    msg.innerHTML = "Navegador incompatível";
}
</script>

</body>
</html>
